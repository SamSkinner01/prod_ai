# version: '3.8'

services:
  # MNIST Training Service
  mnist-trainer:
    build: .
    image: vision-trainer:latest
    container_name: mnist-training

    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Volume mounts for data persistence
    volumes:
      - .:/app

    # Working directory
    working_dir: /app

    # Environment variables
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1

    # Default MNIST training
    # To customize: MNIST_ARGS="training.batch_size=512" docker-compose up mnist-trainer
    command: python3 train.py ${MNIST_ARGS:-}

    # Restart policy - set to "no" so training runs once and stops
    restart: "no"

  # CIFAR-10 Training Service
  cifar-trainer:
    build: .
    image: vision-trainer:latest
    container_name: cifar-training

    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Volume mounts for data persistence
    volumes:
      - .:/app

    # Working directory
    working_dir: /app

    # Environment variables
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1

    command: python3 train_cifar.py

    # Restart policy - set to "no" so training runs once and stops
    restart: "no"

  # MLflow Service
  mlflow:
    build: .
    image: vision-trainer:latest
    container_name: mlflow-server

    # Volume mounts for reading experiment logs
    volumes:
      - .:/app

    # Expose MLflow UI port
    ports:
      - "5000:5000"

    # Working directory
    working_dir: /app

    # Command to run MLflow UI with SQLite backend
    command: mlflow ui --backend-store-uri sqlite:///mlflow.db --host=0.0.0.0 --port=5000

    # Restart policy
    restart: unless-stopped
